<div class="field-group">
  <label class="field-label">{{ label }}</label>

  <div class="field-wrap">
    <span class="field-icon">{{ icon }}</span>
    <input
      class="field-input"
      [type]="showPassword ? 'text' : 'password'"
      [placeholder]="placeholder"
      [formControl]="control"
    />
    <button type="button" class="toggle-pw" (click)="toggleShowPassword()">
      {{ showPassword ? '🙈' : '👁️' }}
    </button>
  </div>
  @if (showStrengthBar) {
    <div class="strength-bar-wrap">
      <div class="strength-label">
        Password strength <span>{{ strengthText }}</span>
      </div>

      <div class="strength-segments">
        <div class="seg" [class.filled]="strength >= 1"></div>
        <div class="seg" [class.filled]="strength >= 2"></div>
        <div class="seg" [class.filled]="strength >= 3"></div>
        <div class="seg" [class.filled]="strength >= 4"></div>
      </div>
    </div>
  }
</div>
