<div class="section-header">
  <div class="section-title">{{ timeframe | titlecase }} Chores</div>
  <div class="section-count">{{ getActive() }} active</div>
</div>
<div class="chore-list">
  @if (chores.length === 0) {
    <div class="chore-card {{ timeframe }}">
      <div class="chore-emoji-wrap bg-purple">🧹</div>
      <div class="empty-text">No {{ timeframe }} chores yet. Add some to keep the kids busy!</div>
    </div>
  } @else {
    @for (chore of chores; track chore.id) {
      <app-chore-card
        [chore]="chore"
        [kidsDictionary]="kidsDictionary"
        (toggleActiveEmitter)="toggleActive($event)"
        (deleteEmitter)="delete($event)"
      />
    }
  }
</div>
