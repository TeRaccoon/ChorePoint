<div class="stats-overview">
  <div class="stat-card">
    <div class="stat-icon">✅</div>
    <div class="stat-value">{{ stats.completedThisWeek }}</div>
    <div class="stat-label">This Week</div>
    <div class="stat-trend">↑ +25%</div>
  </div>
  <div class="stat-card">
    <div class="stat-icon">🔥</div>
    <div class="stat-value">{{ stats.dayStreak }}</div>
    <div class="stat-label">Current Streak</div>
  </div>
  <div class="stat-card full">
    <div class="stat-icon">📊</div>
    <div class="stat-value">{{ stats.approvalRate }}%</div>
    <div class="stat-label">Completion Rate (Last 30 Days)</div>
    <div class="stat-trend">↑ +0%</div>
  </div>
</div>
