<div class="children-list">
  @for (kid of kids; track kid.id) {
    <div class="child-card">
      <div class="child-avatar">{{ kid.avatar }}</div>
      <div class="child-info">
        <div class="child-name">{{ kid.name }}</div>
        <div class="child-stats">
          Age {{ kid.age }} • Streak {{ kid.dayStreak }} • {{ kid.totalPoints }} pts
        </div>
      </div>
      <div class="child-action">⚙️</div>
    </div>
  }
</div>
