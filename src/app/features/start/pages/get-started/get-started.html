<div class="slide" data-slide="4">
  <div class="slide-content">
    <div class="illustration">🚀</div>
    <div class="slide-title">You're All Set!</div>
    <div class="slide-description">Ready to start your chore adventure? Let's go!</div>

    <div class="feature-list">
      <div class="feature-item">
        <div class="feature-icon">🏠</div>
        <div class="feature-text">
          <div class="feature-title">Dashboard</div>
          <div class="feature-description">See your available chores</div>
        </div>
      </div>
      <div class="feature-item">
        <div class="feature-icon">🛒</div>
        <div class="feature-text">
          <div class="feature-title">Shop</div>
          <div class="feature-description">Browse and redeem rewards</div>
        </div>
      </div>
      <div class="feature-item">
        <div class="feature-icon">🏆</div>
        <div class="feature-text">
          <div class="feature-title">Achievements</div>
          <div class="feature-description">Unlock special badges</div>
        </div>
      </div>
    </div>
  </div>

  <div>
    <div class="dots-container">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot active"></div>
    </div>
    <div class="buttons-container">
      <button class="btn btn-primary" (click)="nextSlide()" style="width: 100%">
        Start My Journey!
      </button>
    </div>
  </div>
</div>
