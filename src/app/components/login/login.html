<div class="container">
  <div class="header">
    <div class="header-badge">👨‍👩‍👧 Parent Portal</div>
    <div class="header-logo">🏆</div>
    <div class="header-app-name">ChoreQuest</div>
    <div class="header-tagline">Manage your family's quests</div>
  </div>
  <div class="auth-card">
    <div class="auth-title">Welcome back!</div>
    <div class="auth-subtitle">Sign in to manage your family's chores</div>
    <form [formGroup]="form" (submit)="submit()">
      <div class="field-group">
        <label class="field-label">Email Address</label>
        <div class="field-wrap">
          <span class="field-icon">📧</span>
          <input
            formControlName="email"
            class="field-input"
            type="email"
            placeholder="you@example.com"
          />
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">Password</label>
        <div class="field-wrap">
          <span class="field-icon">🔑</span>
          <input
            formControlName="password"
            class="field-input has-toggle"
            type="password"
            placeholder="Your password"
          />
          <button class="toggle-pw">👁️</button>
        </div>
      </div>

      <div class="forgot-row">
        <a class="forgot-link">Forgot password?</a>
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading() || form.invalid">
        {{ loading() ? 'Signing in ⌛' : 'Sign In 🚀' }}
      </button>
    </form>

    <div class="btn-divider">
      <div class="btn-divider-line"></div>
      <div class="btn-divider-text">or</div>
      <div class="btn-divider-line"></div>
    </div>

    <button class="btn-google">
      <div class="google-g">G</div>
      Continue with Google
    </button>

    <div class="switch-link">New to ChorePoint? <a>Create an account</a></div>
  </div>
</div>
