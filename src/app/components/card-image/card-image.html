<div class="container">
  <div class="image-container">
    <div class="image">
      <img [src]="imageSource" />
    </div>
    <div class="caption-container">
      @if (caption) {
        <p class="caption">{{ caption }}</p>
      }
    </div>
  </div>
  <div class="description-container">
    @if (description) {
      <p class="description">{{ description }}</p>
    }
  </div>
  <div class="footer">
    <p>Cost: {{ cost }} points</p>
  </div>
</div>
