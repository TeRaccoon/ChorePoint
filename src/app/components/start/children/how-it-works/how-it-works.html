<div class="slide">
  <div class="slide-content">
    <div class="illustration">✨</div>
    <div class="slide-title">How It Works</div>

    <div class="feature-list">
      <div class="feature-item">
        <div class="feature-icon">1️⃣</div>
        <div class="feature-text">
          <div class="feature-title">Complete Chores</div>
          <div class="feature-description">Pick a chore and mark it done</div>
        </div>
      </div>
      <div class="feature-item">
        <div class="feature-icon">2️⃣</div>
        <div class="feature-text">
          <div class="feature-title">Earn Points</div>
          <div class="feature-description">Get rewarded for your hard work</div>
        </div>
      </div>
      <div class="feature-item">
        <div class="feature-icon">3️⃣</div>
        <div class="feature-text">
          <div class="feature-title">Unlock Rewards</div>
          <div class="feature-description">Spend points on cool prizes</div>
        </div>
      </div>
    </div>
  </div>

  <div>
    <div class="dots-container">
      <div class="dot"></div>
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <div class="buttons-container">
      <button class="btn btn-secondary" (click)="prevSlide()">Back</button>
      <button class="btn btn-primary" (click)="nextSlide()">Next</button>
    </div>
  </div>
</div>
