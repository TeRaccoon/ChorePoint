<div class="slide">
  <div class="slide-content">
    <div class="illustration">🎮</div>
    <div class="slide-title">Welcome to ChorePoint!</div>
    <div class="slide-description">
      Turn everyday chores into an exciting adventure. Earn points, unlock rewards, and level up!
    </div>
  </div>

  <div>
    <div class="dots-container">
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <div class="buttons-container">
      <button class="btn btn-primary" (click)="nextSlide()">Get Started</button>
    </div>
    <div class="skip-button" (click)="skipTutorial()">Skip Tutorial</div>
  </div>
</div>
